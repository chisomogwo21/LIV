<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Directory</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Caveat+Brush&family=Rock+Salt&family=Kaushan+Script&display=swap"
        rel="stylesheet">
</head>

<body>
    <section class="hero">
        <div class="hamburger" id="hamburgerMenu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav class="main-nav" id="navMenu">
            <a href="#about">About</a>
            <a href="#program">The Program</a>
            <a href="#contact">Contact</a>
        </nav>
        <div class="hero-bg"></div>
        <div class="hero-content full-screen-layout">

            <!-- Main Title Title -->
            <div class="main-title" contenteditable="true">
                Liv's Portfolio
            </div>

            <!-- Top Left -->
            <div class="layout-item top-left" contenteditable="true">
                <div class="heading-cursive">Creative Portfolio</div>
                <p>Film • Writing • Visual Storytelling<br>14 S2rd</p>
            </div>

            <!-- Top Right -->
            <div class="layout-item top-right" contenteditable="true">
                <div class="heading-cursive">Written & Visualized by</div>
                <p>LIV<br>
            </div>

            <!-- Middle Left -->
            <div class="layout-item mid-left" contenteditable="true">
                <div class="heading-cursive">Scene 01 • Portfolio</div>
                <p>@abdallaolivia</p>
            </div>

            <!-- Bottom Left -->
            <div class="layout-item bottom-left" contenteditable="true">
                <p>Exploring Identity, <br>Culture,<br>Emotion Through Film<br>B.G.A<br>4:00 PM</p>
            </div>

            <!-- Bottom Middle -->
            <div class="layout-item bottom-mid" contenteditable="true">
                <p>B.G.A<br>Coming Soon</p>
            </div>

            <!-- Bottom Right -->
            <div class="layout-item bottom-right" contenteditable="true">
                <div class="heading-cursive">© 2026 Liv</div>

            </div>
        </div>
    </section>

    <script>
        const hamburger = document.getElementById('hamburgerMenu');
        const navMenu = document.getElementById('navMenu');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });
    </script>
</body>

</html>
