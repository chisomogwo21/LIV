<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Directory</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <style>
        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #d4d925; /* Chartreuse/Olive Yellow-Green */
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loading-screen.visible {
            opacity: 1;
            visibility: visible;
        }

        .loading-text {
            font-family: 'Great Vibes', cursive;
            font-size: 8rem;
            color: #2b2524;
            transform: scale(0.9);
            transition: transform 1.3s ease;
        }

        .loading-screen.visible .loading-text {
            transform: scale(1);
        }

        /* Page Transition Overlay */
        .page-transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #2b2524; /* Cinematic Black/Dark Brown */
            z-index: 9000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s;
            pointer-events: none;
        }

        .page-transition-overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
        }

        body {
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        body.loaded {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-text">liv</div>
    </div>
    <div id="transitionOverlay" class="page-transition-overlay"></div>
    <section class="hero">
        <div class="hamburger" id="hamburgerMenu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav class="main-nav" id="navMenu">
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About</a>
            <a href="program.html">The Program</a>
            <a href="contact.html">Contact</a>
        </nav>
        <div class="hero-bg"></div>
        <div class="hero-content full-screen-layout">

            <!-- Main Title Title -->
            <div class="main-title" contenteditable="true">
                Olivia Abdalla
            </div>

            <!-- Top Left -->
            <div class="layout-item top-left" contenteditable="true">
                <div class="heading-cursive">Creative Portfolio</div>
                <p>Film • Writing • Visual Storytelling</p>
            </div>

            <!-- Top Right -->
            <div class="layout-item top-right" contenteditable="true">
                <div class="heading-cursive">Written & Visualized by</div>
                <p>LIV</p>
            </div>

            <!-- Middle Left -->
            <div class="layout-item mid-left" contenteditable="true">
                <div class="heading-cursive">Scene 01 • Portfolio</div>
            </div>

            <!-- Bottom Left -->
            <div class="layout-item bottom-left" contenteditable="true">
                <p>Exploring Identity, <br>Culture,<br>Emotion Through Film<br>B.G.A</p>
            </div>

            <!-- Bottom Middle -->
            <div class="layout-item bottom-mid" contenteditable="true">
                <p> Black Girl Anthropology<br>Coming Soon</p>
            </div>

            <!-- Bottom Right -->
            <div class="layout-item bottom-right" contenteditable="true">
                <div class="heading-cursive">© 2026 Liv</div>
            </div>
        </div>
    </section>

    <script>
        const hamburger = document.getElementById('hamburgerMenu');
        const navMenu = document.getElementById('navMenu');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        // Loading Screen & Transitions
        window.addEventListener('DOMContentLoaded', () => {
            const loadingScreen = document.getElementById('loadingScreen');
            const transitionOverlay = document.getElementById('transitionOverlay');

            // Handle Initial Fade-In
            document.body.classList.add('loaded');

            if (loadingScreen && !sessionStorage.getItem('hasSeenLoading')) {
                loadingScreen.classList.add('visible');
                
                setTimeout(() => {
                    loadingScreen.classList.remove('visible');
                    setTimeout(() => {
                        loadingScreen.remove();
                    }, 800);
                    sessionStorage.setItem('hasSeenLoading', 'true');
                }, 1300);
            } else if (loadingScreen) {
                loadingScreen.remove();
            }

            // Handle Page Transitions
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                // Check if internal link
                if (href && !href.startsWith('http') && !href.startsWith('mailto:') && !href.startsWith('#') && !link.hasAttribute('target')) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        transitionOverlay.classList.add('active');
                        setTimeout(() => {
                            window.location.href = href;
                        }, 400);
                    });
                }
            });
        });
    </script>
</body>

</html>
