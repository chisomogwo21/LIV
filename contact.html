<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Portfolio Directory</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <style>
        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #d4d925;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loading-screen.visible {
            opacity: 1;
            visibility: visible;
        }
        .loading-text {
            font-family: 'Great Vibes', cursive;
            font-size: 8rem;
            color: #2b2524;
            transform: scale(0.9);
            transition: transform 1.3s ease;
        }
        .loading-screen.visible .loading-text {
            transform: scale(1);
        }

        /* Page Transition Overlay */
        .page-transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #2b2524;
            z-index: 9000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s;
            pointer-events: none;
        }

        .page-transition-overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .transition-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 4rem;
            color: white;
            text-transform: uppercase;
            position: relative;
            display: none;
        }

        .page-transition-overlay.active .transition-text {
            display: block;
            animation: glitch-skew 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
        }

        .transition-text::before,
        .transition-text::after {
            content: "Olivia Abdalla";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .transition-text::before {
            color: rgba(255, 0, 0, 0.7);
            z-index: -1;
            animation: glitch-anim 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
        }

        .transition-text::after {
            color: rgba(0, 255, 255, 0.7);
            z-index: -2;
            animation: glitch-anim2 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse both infinite;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(-3px, -2px); }
            60% { transform: translate(3px, 2px); }
            80% { transform: translate(3px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch-anim2 {
            0% { transform: translate(0); }
            20% { transform: translate(3px, -2px); }
            40% { transform: translate(3px, 2px); }
            60% { transform: translate(-3px, -2px); }
            80% { transform: translate(-3px, 2px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            20% { transform: skew(2deg); }
            40% { transform: skew(-3deg); }
            60% { transform: skew(1deg); }
            80% { transform: skew(-1deg); }
            100% { transform: skew(0deg); }
        }

        body {
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        body.loaded {
            opacity: 1;
        }

        /* Custom Cursor */
        * {
            cursor: none !important;
        }

        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 12px;
            height: 12px;
            background-color: #d4d925;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease;
        }

        .cursor-follower {
            position: fixed;
            top: 0;
            left: 0;
            width: 32px;
            height: 32px;
            border: 2px solid #d4d925;
            border-radius: 50%;
            opacity: 0.4;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
        }

        .custom-cursor.hover {
            transform: translate(-50%, -50%) scale(1.5);
        }

        .cursor-follower.hover {
            width: 48px;
            height: 48px;
            opacity: 0.6;
        }

        @media (max-width: 1024px) {
            .custom-cursor, .cursor-follower {
                display: none;
            }
            * {
                cursor: auto !important;
            }
        }

        /* Scroll Reveal Animation */
        .reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.7s ease-out, transform 0.7s ease-out;
        }

        .reveal.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* Common Footer Styles */
        .site-footer {
            padding: 1.5rem 3rem;
            border-top: 0.5px solid rgba(0,0,0,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Barlow Condensed', sans-serif;
            color: #2b2524;
            position: relative;
            z-index: 10;
        }

        .footer-left {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .footer-center {
            display: flex;
            gap: 2rem;
        }

        .footer-center a {
            text-decoration: none;
            color: #2b2524;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            transition: opacity 0.3s;
        }

        .footer-center a:hover {
            opacity: 0.6;
        }

        .footer-right {
            font-family: 'Great Vibes', cursive;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .site-footer {
                flex-direction: column;
                gap: 1.5rem;
                padding: 2rem 1.5rem;
                text-align: center;
            }
            .footer-center {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>

<body class="contact-page">
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-text">liv</div>
    </div>
    <div id="transitionOverlay" class="page-transition-overlay">
        <div class="transition-text">Olivia Abdalla</div>
    </div>
    <div class="custom-cursor" id="cursor"></div>
    <div class="cursor-follower" id="follower"></div>
    <div class="hamburger" id="hamburgerMenu">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <nav class="main-nav reveal" id="navMenu">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="program.html">The Program</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>

    <!-- Main Title (Top Left) -->
    <div class="main-title reveal" contenteditable="true" style="position: absolute; top: 3%; left: 4%; transform: rotate(-2deg); font-family: 'Barlow Condensed', sans-serif; font-weight: 800; text-transform: uppercase; font-size: clamp(3rem, 6vw, 5rem); color: #2b2524; z-index: 10; pointer-events: none;">
        Olivia Abdalla
    </div>

    <div class="typewriter-container reveal">
        <button id="soundToggle" class="sound-toggle">Sound: OFF</button>
        <div class="paper-roll-top">
            <div class="roll-texture"></div>
        </div>
        <div class="paper-sheet" id="paperSheet">
            <div class="typed-content" id="typedContent"></div>
        </div>
    <footer class="site-footer reveal" style="background-color: #f5f3e7;">
        <div class="footer-left">© 2026 Liv Abdalla</div>
        <div class="footer-center">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="program.html">The Program</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="footer-right">Film · Writing · Visual Storytelling</div>
    </footer>

    <script>
        const hamburger = document.getElementById('hamburgerMenu');
        const navMenu = document.getElementById('navMenu');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        // Typewriter logic
        const lines = [
            { text: "LinkedIn", url: "#", target: "_blank" },
            { text: "Email", url: "mailto:#", target: "" },
            { text: "Resume", url: "#", target: "", download: true }
        ];

        const container = document.getElementById('typedContent');
        const paper = document.getElementById('paperSheet');
        const soundToggle = document.getElementById('soundToggle');

        let soundEnabled = false;
        let audioCtx = null;

        // Toggle sound and initialize AudioContext on user interaction to bypass autoplay restrictions
        soundToggle.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            soundToggle.textContent = soundEnabled ? 'Sound: ON' : 'Sound: OFF';
            if (soundEnabled && !audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (soundEnabled && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        });

        function playTypeSound() {
            if (!soundEnabled || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'square';
                // Typewriter clack pitch
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.03);
                
                // Very short percussive envelope
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.03);
            } catch(e) {}
        }

        let currentLineIndex = 0;

        function typeLines() {
            if (currentLineIndex >= lines.length) return;

            const lineData = lines[currentLineIndex];
            const a = document.createElement('a');
            a.href = lineData.url;
            if (lineData.target) a.target = lineData.target;
            if (lineData.download) a.setAttribute('download', '');
            a.className = 'typed-line typing';
            container.appendChild(a);

            let charIndex = 0;

            function typeChar() {
                if (charIndex < lineData.text.length) {
                    a.textContent += lineData.text.charAt(charIndex);
                    playTypeSound();
                    charIndex++;
                    // Random delay between characters for realistic typing (50ms - 150ms)
                    setTimeout(typeChar, 50 + Math.random() * 100); 
                } else {
                    // Line finished
                    a.classList.remove('typing');
                    a.classList.add('finished');
                    currentLineIndex++;
                    // Wait before starting the next line (carriage return delay)
                    setTimeout(typeLines, 600); 
                }
            }

            typeChar();
        }

        // Loading Screen & Transitions
        window.addEventListener('DOMContentLoaded', () => {
            const loadingScreen = document.getElementById('loadingScreen');
            const transitionOverlay = document.getElementById('transitionOverlay');

            // Handle Initial Fade-In
            document.body.classList.add('loaded');

            const startTypewriter = () => {
                setTimeout(() => {
                    paper.classList.add('unfurled');
                    setTimeout(typeLines, 1200);
                }, 300);
            };

            if (loadingScreen && !sessionStorage.getItem('hasSeenLoading')) {
                loadingScreen.classList.add('visible');
                setTimeout(() => {
                    loadingScreen.classList.remove('visible');
                    setTimeout(() => {
                        loadingScreen.remove();
                        startTypewriter();
                    }, 800);
                    sessionStorage.setItem('hasSeenLoading', 'true');
                }, 1300);
            } else if (loadingScreen) {
                loadingScreen.remove();
                startTypewriter();
            }

            // Handle Page Transitions
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('http') && !href.startsWith('mailto:') && !href.startsWith('#') && !link.hasAttribute('target')) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        transitionOverlay.classList.add('active');
                        setTimeout(() => {
                            window.location.href = href;
                        }, 400);
                    });
                }
            });

            // Custom Cursor Logic
            const cursor = document.getElementById('cursor');
            const follower = document.getElementById('follower');
            let mouseX = 0, mouseY = 0;
            let followerX = 0, followerY = 0;

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                cursor.style.left = mouseX + 'px';
                cursor.style.top = mouseY + 'px';
            });

            const render = () => {
                followerX += (mouseX - followerX) * 0.15;
                followerY += (mouseY - followerY) * 0.15;
                follower.style.left = followerX + 'px';
                follower.style.top = followerY + 'px';
                requestAnimationFrame(render);
            };
            render();

            const hoverables = document.querySelectorAll('a, button, .file-tab, .folder-front, .folder-back, [contenteditable="true"]');
            hoverables.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursor.classList.add('hover');
                    follower.classList.add('hover');
                });
                el.addEventListener('mouseleave', () => {
                    cursor.classList.remove('hover');
                    follower.classList.remove('hover');
                });
            });

            // Scroll Reveal Logic
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                let delay = 0;
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => {
                            entry.target.classList.add('revealed');
                        }, delay);
                        delay += 100;
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            const revealElements = document.querySelectorAll('.reveal');
            revealElements.forEach((el) => observer.observe(el));
        });
    </script>
</body>

</html>
